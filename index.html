const SHUFFLE_ORDER = (() => {
  const arr = Array.from({ length: 108 }, (_, i) => i);
  let seed = 42;
  for (let i = arr.length - 1; i > 0; i--) {
    seed = (seed * 16807 + 0) % 2147483647;
    const j = seed % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
})();

function getCompat(a, b, lang) {
  const key = `${Math.min(a, b)}-${Math.max(a, b)}`;
  return COMPAT_DATA[lang][key] || { r: 3, d: "—" };
}

  const [lang, setLang] = useState("en");
  const [screen, setScreen] = useState("landing");
  const [answers, setAnswers] = useState({});
  const [currentQ, setCurrentQ] = useState(0);
  const [result, setResult] = useState(null);
  const [fadeIn, setFadeIn] = useState(true);
  const [expandedCompat, setExpandedCompat] = useState(null);
  const resultRef = useRef(null);

  const ui = UI[lang];
  const totalQ = 108;
  const progress = (Object.keys(answers).length / totalQ) * 100;

  const getQuestion = (idx) => {
    const origIdx = SHUFFLE_ORDER[idx];
    return { text: QUESTIONS_DATA[lang][origIdx], type: Q_TYPES[origIdx] };
  };

  const handleAnswer = (val) => {
    setFadeIn(false);
    setTimeout(() => {
      setAnswers(prev => ({ ...prev, [currentQ]: val }));
      if (currentQ < totalQ - 1) setCurrentQ(currentQ + 1);
      setFadeIn(true);
    }, 200);
  };

  const calculateResult = () => {
    const scores = {};
    for (let t = 1; t <= 9; t++) scores[t] = 0;
    Object.entries(answers).forEach(([qIdx, val]) => {
      const origIdx = SHUFFLE_ORDER[parseInt(qIdx)];
      scores[Q_TYPES[origIdx]] += val;

                <button onClick={() => { setScreen("landing"); setAnswers({}); setCurrentQ(0); setResult(null); setExpandedCompat(null); }}
                  style={{ fontFamily: "'DM Sans'", fontSize: 12, letterSpacing: 3, textTransform: "uppercase", padding: "14px 40px", background: "transparent", border: "1px solid rgba(80,70,60,0.2)", color: "#7a7570", cursor: "pointer" }}
                  onMouseOver={e => { e.target.style.borderColor = "rgba(80,70,60,0.5)"; e.target.style.color = "#c8c0b4"; }}
                  onMouseOut={e => { e.target.style.borderColor = "rgba(80,70,60,0.2)"; e.target.style.color = "#7a7270"; }}
                >
                  {ui.retake}
                </button>
              </div>
            </div>
          </div>
        );
      })()}
    </LangCtx.Provider>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(EnneagramTest));
  </script>
